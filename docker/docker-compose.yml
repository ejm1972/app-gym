services:

  nginx:
    image: nginx:1.25-alpine
    container_name: app-gym-nginx
    ports:
      - "8080:80"
    volumes:
      - ..:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - app-gym-net

  php:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: app-gym-php
    volumes:
      - ..:/var/www/html
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-gym-net

  db:
    image: mysql:8.0
    container_name: app-gym-db
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ../bd/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-gym-net

volumes:
  db_data:

networks:
  app-gym-net:
    driver: bridge
