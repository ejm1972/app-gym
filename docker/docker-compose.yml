services:

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: app-gym-php
    ports:
      - "8080:80"
    volumes:
      - ..:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-gym-net

  db:
    image: mysql:8.0
    container_name: app-gym-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_gym
      MYSQL_USER: appgym
      MYSQL_PASSWORD: appgym123
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ../bd/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-gym-net

volumes:
  db_data:

networks:
  app-gym-net:
    driver: bridge
